<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Background transparent -->
  <defs>
    <linearGradient id="compassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e1;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Compass Icon -->
  <g transform="translate(30, 20)">
    <!-- Outer circle -->
    <circle cx="40" cy="40" r="38" fill="none" stroke="url(#compassGrad)" stroke-width="3" filter="url(#glow)"/>
    <circle cx="40" cy="40" r="35" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.3"/>
    
    <!-- Compass points -->
    <text x="40" y="12" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="bold" font-family="Arial">N</text>
    <text x="40" y="76" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="Arial">S</text>
    <text x="12" y="44" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="Arial">W</text>
    <text x="68" y="44" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="Arial">E</text>
    
    <!-- Mountain silhouette inside compass -->
    <path d="M20 50 L30 35 L40 45 L50 30 L60 50 Z" fill="url(#mountainGrad)" opacity="0.9"/>
    
    <!-- Compass needle -->
    <polygon points="40,18 44,40 40,46 36,40" fill="#ef4444" opacity="0.9"/>
    <polygon points="40,62 36,40 40,34 44,40" fill="#f8fafc" opacity="0.9"/>
    
    <!-- Center dot -->
    <circle cx="40" cy="40" r="4" fill="#38bdf8"/>
  </g>
  
  <!-- Brand Text -->
  <g transform="translate(95, 35)">
    <!-- Travel -->
    <text x="0" y="35" font-family="'Poppins', 'Arial', sans-serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="-1">Travel</text>
    
    <!-- & symbol -->
    <text x="98" y="35" font-family="'Georgia', serif" font-size="28" font-style="italic" fill="#ffffff" opacity="0.9">&amp;</text>
    
    <!-- Trouble in red with style -->
    <text x="125" y="35" font-family="'Georgia', serif" font-size="32" font-weight="700" font-style="italic" fill="#ef4444" filter="url(#glow)">Trouble</text>
    
    <!-- Tagline -->
    <text x="0" y="58" font-family="'Inter', 'Arial', sans-serif" font-size="12" fill="#94a3b8" letter-spacing="2" text-transform="uppercase">ADVENTURE AWAITS • EST. 2026</text>
  </g>
  
  <!-- Decorative elements -->
  <line x1="95" y1="70" x2="280" y2="70" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>
</svg>
