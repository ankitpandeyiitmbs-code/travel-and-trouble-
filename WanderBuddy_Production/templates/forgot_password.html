<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Travel & Trouble</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { background: var(--ivory); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem 1rem; }
        .auth-card { background: #fff; border: 1px solid var(--border); border-radius: var(--r-xl); padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: var(--shadow-md); }
        .brand-logo { color: var(--terra); font-size: 2rem; margin-bottom: 1rem; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="text-center mb-4">
        <a href="/" class="brand-logo d-inline-block">
            <i class="fa-solid fa-compass"></i>
        </a>
        <h2 class="fw-bold" style="font-family:'Cormorant Garamond', serif;">Forgot Password?</h2>
        <p class="text-muted small">Enter your email and we'll send you a link to reset your password.</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'success' if category == 'success' else ('info' if category == 'info' else 'danger') }} alert-dismissible fade show mb-4" style="font-size:0.88rem;">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="/forgot-password" method="POST">
        <div class="mb-4">
            <label class="label-caps mb-2">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="explorer@wanderbuddy.com" required>
        </div>
        <button type="submit" class="btn btn-terra w-100 btn-lg">Send Reset Link</button>
    </form>

    <div class="mt-4 text-center">
        <p class="small text-muted mb-0">Remembered it? <a href="/login" class="fw-bold" style="color:var(--navy);">Login here</a></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
