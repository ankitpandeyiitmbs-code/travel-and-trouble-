<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Event - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #f97316;
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            color: var(--text-primary);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        .navbar {
            background: rgba(15, 23, 42, 0.9) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }
        
        .editor-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            margin-top: 2rem;
        }
        
        .event-preview {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 2rem;
        }
        
        .form-control, .form-select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }
        
        .form-control:focus, .form-select:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: var(--accent);
            color: var(--text-primary);
            box-shadow: 0 0 0 0.25rem rgba(249, 115, 22, 0.25);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            border: none;
            padding: 0.75rem 2rem;
            font-weight: 600;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #ea580c 0%, #c2410c 100%);
            transform: translateY(-2px);
        }
        
        .btn-outline-secondary {
            border-color: var(--border);
            color: var(--text-secondary);
        }
        
        .btn-outline-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            color: var(--text-primary);
        }
        
        .category-badge {
            background: rgba(249, 115, 22, 0.2);
            color: var(--accent);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 500;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/admin">
                <i class="fa-solid fa-shield-halved me-2 text-warning"></i>Admin Panel
            </a>
            <div class="d-flex align-items-center gap-3">
                <a href="/admin" class="btn btn-sm btn-outline-light">
                    <i class="fa-solid fa-arrow-left me-1"></i>Back to Dashboard
                </a>
            </div>
        </div>
    </nav>

    <div class="container" style="padding-top: 100px; padding-bottom: 50px;">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="editor-card">
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="category-badge">
                            <i class="fa-solid fa-calendar-star me-1"></i>Edit Event
                        </div>
                        <h2 class="fw-bold mb-0">{{ event['title'] }}</h2>
                    </div>

                    <img src="{{ event['image_url'] }}" alt="{{ event['title'] }}" class="event-preview">

                    <form method="POST" action="/admin/events/edit">
                        <input type="hidden" name="id" value="{{ event['id'] }}">
                        
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Event Title</label>
                                <input type="text" name="title" class="form-control" value="{{ event['title'] }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Category</label>
                                <select name="category" class="form-select" required>
                                    <option value="Festival" {% if event['category'] == 'Festival' %}selected{% endif %}>Festival</option>
                                    <option value="Camp" {% if event['category'] == 'Camp' %}selected{% endif %}>Camp</option>
                                    <option value="Workshop" {% if event['category'] == 'Workshop' %}selected{% endif %}>Workshop</option>
                                    <option value="Race" {% if event['category'] == 'Race' %}selected{% endif %}>Race</option>
                                    <option value="Retreat" {% if event['category'] == 'Retreat' %}selected{% endif %}>Retreat</option>
                                    <option value="Other" {% if event['category'] == 'Other' %}selected{% endif %}>Other</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Price (₹)</label>
                                <input type="number" name="price" class="form-control" value="{{ event['price'] }}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Duration</label>
                                <input type="text" name="duration" class="form-control" value="{{ event['duration'] }}" placeholder="e.g., 3 days" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Event Date</label>
                                <input type="date" name="event_date" class="form-control" value="{{ event['event_date'] or '' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Location</label>
                                <input type="text" name="location" class="form-control" value="{{ event['location'] or '' }}" placeholder="e.g., Manali, Himachal Pradesh">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Image URL</label>
                                <input type="url" name="image_url" class="form-control" value="{{ event['image_url'] }}" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Description</label>
                                <textarea name="description" class="form-control" rows="5" required>{{ event['description'] }}</textarea>
                            </div>
                        </div>
                        
                        <div class="d-flex gap-3">
                            <button type="submit" class="btn btn-primary">
                                <i class="fa-solid fa-save me-2"></i>Save Changes
                            </button>
                            <a href="/admin" class="btn btn-outline-secondary">
                                <i class="fa-solid fa-times me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
