{% extends "layout.html" %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center py-5" style="background: var(--bg-sunken);">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-7 col-lg-5">
        <div class="card p-4 p-md-5 shadow-sm">
          <div class="text-center mb-4">
            <div class="mb-3" style="font-size:2.5rem; color:var(--terra);"><i class="fa-solid fa-key"></i></div>
            <h2 class="mb-1" style="font-family:'Cormorant Garamond',serif; color:var(--navy);">Reset Password</h2>
            <p class="text-muted mb-0">Enter your email and we'll send you a reset link</p>
          </div>
          <form method="POST">
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-control" name="email" required autofocus placeholder="you@example.com">
            </div>
            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-terra btn-lg">Send Reset Link</button>
            </div>
          </form>
          <hr class="my-4">
          <p class="text-center mb-0 text-muted">
            Remember your password? <a href="/login" class="text-terra fw-semibold">Sign In</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
