{% extends "layout.html" %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center py-5" style="background: var(--bg-sunken);">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-7 col-lg-5">
        <div class="card p-4 p-md-5 shadow-sm">
          <div class="text-center mb-4">
            <div class="mb-3" style="font-size:2.5rem; color:var(--terra);"><i class="fa-solid fa-lock-open"></i></div>
            <h2 class="mb-1" style="font-family:'Cormorant Garamond',serif; color:var(--navy);">New Password</h2>
            <p class="text-muted mb-0">Choose a strong password</p>
          </div>
          <form method="POST">
            <div class="mb-3">
              <label class="form-label">New Password</label>
              <div class="input-group">
                <input type="password" class="form-control" id="pw1" name="password" required minlength="6" placeholder="Min 6 characters">
                <button class="btn btn-outline-secondary" type="button" onclick="togglePwd('pw1',this)" tabindex="-1">
                  <i class="fa-solid fa-eye"></i>
                </button>
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label">Confirm Password</label>
              <div class="input-group">
                <input type="password" class="form-control" id="pw2" name="confirm_password" required minlength="6" placeholder="Repeat password">
                <button class="btn btn-outline-secondary" type="button" onclick="togglePwd('pw2',this)" tabindex="-1">
                  <i class="fa-solid fa-eye"></i>
                </button>
              </div>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-terra btn-lg">Set New Password</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function togglePwd(id, btn){
  const inp = document.getElementById(id);
  const icon = btn.querySelector('i');
  if(inp.type==='password'){ inp.type='text'; icon.className='fa-solid fa-eye-slash'; }
  else { inp.type='password'; icon.className='fa-solid fa-eye'; }
}
document.querySelector('form').addEventListener('submit', function(e){
  const p1=document.getElementById('pw1').value, p2=document.getElementById('pw2').value;
  if(p1!==p2){ e.preventDefault(); alert('Passwords do not match.'); }
});
</script>
{% endblock %}
