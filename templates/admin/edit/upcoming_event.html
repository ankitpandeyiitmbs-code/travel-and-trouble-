{% extends "layout.html" %}
{% block title %}Edit Upcoming Event - Admin{% endblock %}
{% block content %}
<div class="py-4" style="background:var(--bg-sunken); min-height:100vh;">
  <div class="container px-3 px-md-4">
    <div class="d-flex align-items-center mb-3">
      <a href="{{ url_for('admin_panel') }}#upcoming_events" class="btn btn-outline-secondary btn-sm me-2">
        <i class="fa-solid fa-arrow-left"></i> Back
      </a>
      <h3 class="mb-0" style="font-family:'Cormorant Garamond',serif; color:var(--navy);">Edit Upcoming Event</h3>
    </div>
    <div class="card">
      <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Title</label>
              <input type="text" class="form-control" name="title" value="{{ event.title }}" required>
            </div>
            <div class="col-12">
              <label class="form-label">Description</label>
              <textarea class="form-control" name="description" rows="4">{{ event.description or '' }}</textarea>
            </div>
            <div class="col-12">
              <label class="form-label">Image URL</label>
              <input type="url" class="form-control" name="image_url" value="{{ event.image_url or '' }}" placeholder="https://...">
            </div>
            <div class="col-12">
              <label class="form-label">Or Upload New Image</label>
              <input type="file" class="form-control" name="image_file" accept="image/*">
              {% if event.image_url %}
              <div class="mt-2">
                <img src="{{ event.image_url }}" style="max-width:200px;max-height:150px;object-fit:cover;border-radius:6px;" alt="Current image">
              </div>
              {% endif %}
            </div>
            <div class="col-6">
              <label class="form-label">Event Date</label>
              <input type="date" class="form-control" name="event_date" value="{{ event.event_date }}" required>
            </div>
            <div class="col-6">
              <label class="form-label">Price (₹)</label>
              <input type="number" class="form-control" name="price" value="{{ event.price }}" required min="0">
            </div>
            <div class="col-6">
              <label class="form-label">Location</label>
              <input type="text" class="form-control" name="location" value="{{ event.location or '' }}">
            </div>
            <div class="col-6">
              <label class="form-label">Category</label>
              <input type="text" class="form-control" name="category" value="{{ event.category }}" required>
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-terra">
                <i class="fa-solid fa-floppy-disk me-2"></i>Save Changes
              </button>
              <a href="{{ url_for('admin_panel') }}#upcoming_events" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
