{% extends "layout.html" %}
{% block content %}
<div class="py-4" style="background:var(--bg-sunken); min-height:100vh;">
  <div class="container" style="max-width:800px;">
    <div class="mb-4">
      <a href="/admin#events" class="text-muted text-decoration-none small">
        <i class="fa-solid fa-arrow-left me-1"></i>Back to Admin — Events
      </a>
      <h3 class="mt-2 mb-0" style="font-family:'Cormorant Garamond',serif; color:var(--navy);">
        Edit Event — <span class="text-terra">{{ event.title }}</span>
      </h3>
    </div>

    <div class="card">
      <div class="card-body p-4">
        <form method="POST" action="/admin/events/edit">
          <input type="hidden" name="event_id" value="{{ event.id }}">
          <div class="row g-3">
            <div class="col-12 col-md-8">
              <label class="form-label">Event Title</label>
              <input type="text" class="form-control" name="title" value="{{ event.title }}" required>
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">Price (₹)</label>
              <input type="number" class="form-control" name="price" value="{{ event.price }}" required min="1">
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">Duration</label>
              <input type="text" class="form-control" name="duration" value="{{ event.duration or '' }}" placeholder="1 Day">
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">Location</label>
              <input type="text" class="form-control" name="location" value="{{ event.location or '' }}">
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">Event Date</label>
              <input type="date" class="form-control" name="event_date" value="{{ event.event_date or '' }}">
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label">Category</label>
              <select class="form-select" name="category">
                {% for cat in ['Adventure','Campside','Camping','Wellness','Cultural'] %}
                <option {% if event.category == cat %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label">Image URL</label>
              <input type="url" class="form-control" name="image_url" value="{{ event.image_url or '' }}">
            </div>
            <div class="col-12">
              <label class="form-label">Description</label>
              <textarea class="form-control" name="description" rows="5">{{ event.description or '' }}</textarea>
            </div>
            <div class="col-12 d-flex gap-3">
              <button type="submit" class="btn btn-terra px-4">
                <i class="fa-solid fa-floppy-disk me-2"></i>Save Changes
              </button>
              <a href="/admin#events" class="btn btn-outline-secondary px-4">Cancel</a>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
